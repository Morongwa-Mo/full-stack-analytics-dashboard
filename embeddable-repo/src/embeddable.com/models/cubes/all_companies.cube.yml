cubes:
  - name: companies
    title: Company Data
    sql_table: hubspot.company
    data_source: hubspot_BQ

    joins:
     - name: ids
       sql: "CAST({CUBE}.hs_object_id AS STRING) = CAST({ids}.company_id AS STRING)"
       relationship: one_to_many
    dimensions:
      - name: companyID
        sql: hs_object_id
        type: number
        primary_key: true

      - name: companyName
        sql: name
        type: string
        
      - name: industry
        sql: industry
        type: string
        
     # - name: number_of_employees
      #  sql: number_of_employees
       # type: number
        
     
    
   