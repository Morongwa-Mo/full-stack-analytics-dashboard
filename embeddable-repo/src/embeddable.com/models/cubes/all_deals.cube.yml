cubes:
  - name: deals
    title: Deals data
    sql_table: hubspot.deals
    data_source: hubspot_BQ
    
    joins:
      - name: ids
        sql:  "CAST({CUBE}.hs_object_id AS STRING) = CAST({ids}.deal_id AS STRING)"
        relationship: one_to_many

    dimensions:
      - name: deals_id
        sql: hs_object_id                                  
        type: number
        primary_key: true
        
      #- name: rfp_date
       # sql: rfp_ate
        #type: time
        
      #- name: proposal_sumission_date
       # sql: DATE(proposal_submission_date)
        #type: time
        
      - name: dealName
        sql: dealname
        type: string
        
      - name: dealStage
        sql: dealstage
        type: string

      - name: stage_grouped
        sql: |
          CASE
          WHEN LOWER({CUBE}.dealstage) = 'closedwon' THEN 'Closed Won'
          WHEN LOWER({CUBE}.dealstage) = 'closedlost' THEN 'Closed Lost'
          WHEN LOWER({CUBE}.dealstage) = 'contractsent' THEN 'Contract Sent'
          WHEN {CUBE}.dealstage IS NULL THEN 'Unknown'
          ELSE 'Early Stage'
          END
        type: string
        
      - name: dealsStageFiltered
        sql: | 
          CASE
            WHEN  LOWER({CUBE}.dealstage) IN ('closedwon', 'closedlost', 'contractsent')
            THEN {CUBE}.dealstage
            ELSE NULL
          END
        type: string
     # - name: deal_type
      #  sql: deal_type
       # type: string

    #  - name: deal_owner
    #    sql: deal_owner
     #   type: string

      #- name: closed_won
       # sql: Is_closed_won
        #type: boolean

     # - name: closed_lost
      #  sql: Is_closed_lost
       # type: boolean

      - name: createDate
        sql: "TIMESTAMP({CUBE}.createdate)"
        type: time

      - name: createDateOnly
        sql: "DATE(TIMESTAMP({CUBE}.createdate))"
        type: time

      - name: amount
        sql: amount
        type: number

     # - name: days_to_close
      #  sql: days_to_close
       # type: number

      #- name: deal_probability
       # sql: deal_probability
        #type: number
    
    measures:
     
      - name: totalRevenue
        type: sum
        sql: CASE
            WHEN {CUBE}.dealstage = 'closedwon'
            THEN amount
            END
        
      - name: totalDealsValue
        type: sum
        sql: amount

      - name: totalDeals
        type: count
    

      - name: totalDealsFinalStage
        type: count
        filters:
         - sql: "{dealsStageFiltered} IS NOT NULL"


      - name: totalDealEarlyStage
        type: count
        filters:
         - sql: "{CUBE}.dealStage NOT IN ('closedwon','closedlost','contractsent')"
        
      - name: average_days_to_close_deal
        type: avg
        sql: >
         CASE
          WHEN {CUBE}.dealstage IN ('closedwon', 'closedlost')
          AND {CUBE}.closedate IS NOT NULL
          AND {CUBE}.createdate IS NOT NULL
           AND DATE(TIMESTAMP({CUBE}.closedate)) >= DATE(TIMESTAMP({CUBE}.createdate))
          THEN DATE_DIFF(
          DATE(TIMESTAMP({CUBE}.closedate)),
          DATE(TIMESTAMP({CUBE}.createdate)),
          DAY
          )
         END

      - name: closedDeals
        type: sum
        sql: CASE
                WHEN {CUBE}.dealstage IN ('closedwon', 'closedlost')
                THEN 1
              END
     
      - name: wonDeals
        type: sum
        sql: CASE
                WHEN {CUBE}.dealstage = 'closedwon'
                THEN 1
              END

    #  - name: sales_qualified
     #   type: count
