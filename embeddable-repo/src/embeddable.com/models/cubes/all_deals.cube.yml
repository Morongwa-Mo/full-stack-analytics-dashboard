         #       THEN 1
          #    END

      #- name: average_request_to_submission_time
       # type: avg
        #sql:  CASE
         #      WHEN proposal_submission_date IS NOT NULL
            #        AND rfp_date IS NOT NULL
          #     THEN DATE_DIFF(DATE(proposal_submission_date), DATE(rfp_date), DAY)
           #  END

      - name: overall_conversion_rate
        type: number
        sql: "{wonDeals}* 1.0 / NULLIF({totalDeals},0) * 100"

