cubes:
  - name: deals
    title: Deals data
    sql_table: hubspot.deals
    data_source: hubspot_BQ
    
    joins:
      - name: ids
        sql: "CAST({CUBE}.hs_object_id AS STRING) = CAST({ids}.deal_id AS STRING)"
        relationship: one_to_many

    dimensions:
      - name: deals_id
        sql: hs_object_id
        type: number
        primary_key: true
        
      - name: dealName
        sql: dealname
        type: string
        
      - name: dealStage
        sql: dealstage
        type: string

      - name: stage_grouped
        sql: |
          CASE
            WHEN LOWER({CUBE}.dealstage) = 'closedwon' THEN 'Closed Won'
            WHEN LOWER({CUBE}.dealstage) = 'closedlost' THEN 'Closed Lost'
            WHEN LOWER({CUBE}.dealstage) = 'contractsent' THEN 'Contract Sent'
            WHEN LOWER({CUBE}.dealstage) = '1918785774' THEN 'Sales Qualified Lead'
            WHEN {CUBE}.dealstage IS NULL THEN 'Unknown'
            ELSE 'Early Stage'
          END
        type: string
        
      - name: dealsStageFiltered
        sql: | 
          CASE
            WHEN LOWER({CUBE}.dealstage) IN ('closedwon', 'closedlost', 'contractsent')
            THEN {CUBE}.dealstage
            ELSE NULL
          END
        type: string

      - name: closeDate
        sql: "TIMESTAMP({CUBE}.closedate)"
        type: time

      - name: createDate
        sql: "TIMESTAMP({CUBE}.createdate)"
        type: time

      - name: createDateOnly
        sql: "DATE(TIMESTAMP({CUBE}.createdate))"
        type: time

      - name: amount
        sql: amount
        type: number

    
    measures:
      - name: totalRevenue
        type: sum
        sql: CASE
          WHEN {CUBE}.dealstage = 'closedwon'
          THEN amount
          END
        
      - name: totalDealsValue
        type: sum
        sql: amount

      - name: totalDeals
        type: count_distinct
        sql: hs_object_id

      - name: totalDealsFinalStage
        type: count_distinct
        sql: hs_object_id
        filters:
          - sql: "{dealsStageFiltered} IS NOT NULL"

      - name: totalDealEarlyStage
        type: count_distinct
        sql: hs_object_id
        filters:
          - sql: "{CUBE}.dealStage NOT IN ('closedwon','closedlost','contractsent')"
        
      - name: average_days_to_close_deal
        type: avg
        sql: >
          CASE
            WHEN {CUBE}.dealstage IN ('closedwon', 'closedlost')
             AND {CUBE}.closedate IS NOT NULL
             AND {CUBE}.createdate IS NOT NULL
             AND DATE(TIMESTAMP({CUBE}.closedate)) >= DATE(TIMESTAMP({CUBE}.createdate))
            THEN DATE_DIFF(
              DATE(TIMESTAMP({CUBE}.closedate)),
              DATE(TIMESTAMP({CUBE}.createdate)),
              DAY
            )
          END

      - name: closedDeals
        type: sum
        sql: CASE
          WHEN {CUBE}.dealstage IN ('closedwon', 'closedlost')
          THEN 1
          END

      - name: wonDeals
        type: sum
        sql: CASE
          WHEN {CUBE}.dealstage = 'closedwon'
          THEN 1
          END

      - name: wonAmount
        sql: CASE 
         WHEN LOWER({CUBE}.dealstage) = 'closedwon' 
         THEN {CUBE}.amount 
         ELSE 0 
         END
        type: sum

      - name: avgWonDealSize
        sql: 
          CASE 
          WHEN {wonDeals} = 0 THEN 0
          ELSE {wonAmount} * 1.0 / {wonDeals}
         END
        type: number

      - name: lostAmount
        sql: CASE 
          WHEN LOWER({CUBE}.dealstage) = 'closedlost' 
          THEN {CUBE}.amount 
          ELSE 0 
          END
        type: sum

      - name: lostdeals
        type: sum
        sql: CASE
          WHEN {CUBE}.dealstage = 'closedlost'
          THEN 1
          END
      - name: avgLostDealSize
        sql: 
          CASE 
          WHEN {lostdeals} = 0 THEN 0
          ELSE {lostAmount} * 1.0 / {lostdeals}
          END
        type: number
        
      - name: wonlostdeals
        type: sum
        sql: CASE
          WHEN {CUBE}.dealstage IN ('closedwon', 'closedlost')
          THEN 1
          END
     
      - name: winRate
        type: number
        sql: "{wonDeals} * 1.0 / NULLIF({closedDeals}, 0) * 100"

      - name: overall_conversion_rate
        type: number
        sql: "{wonDeals}  / NULLIF({totalDeals}, 0) * 100"

      - name: totalHealthcareDeals
        type: count_distinct
        sql: hs_object_id
        filters:
        - sql: "{companies.industryClean} = 'Healthcare'"

      - name: totalwonHealthcareDeals
        type: count_distinct
        sql: hs_object_id
        filters:
         - sql: "{companies.industryClean} = 'Healthcare'"
         - sql: "LOWER({CUBE}.dealstage) = 'closedwon'"

      - name: conversionRateHealthcare
        type: number
        sql: "${totalwonHealthcareDeals} * 1.0 / NULLIF(${totalHealthcareDeals}, 0) * 100"

      - name: totalITSoftwareDeals
        type: count_distinct  
        sql: hs_object_id
        filters:
        - sql: "{companies.industryClean} = 'IT & Software'"

      - name: totalwonITSoftwareDeals
        type: count_distinct  
        sql: hs_object_id
        filters:
        - sql: "{companies.industryClean} = 'IT & Software'"
        - sql: "{dealsStageFiltered} = 'closedwon'"

      - name: conversionarateITSoftware
        type: number  
        sql: "{totalwonITSoftwareDeals} * 1.0 / NULLIF({totalITSoftwareDeals}, 0) * 100"

      - name: totalFinanceDeals
        type: count_distinct
        sql: hs_object_id
        filters:        
        - sql: "{companies.industryClean} = 'Finance'"

      - name: totalwonFinanceDeals
        type: count_distinct
        sql: hs_object_id
        filters:
        - sql: "{companies.industryClean} = 'Finance'"
        - sql: "{dealsStageFiltered} = 'closedwon'"

      - name: conversionarateFinance  
        type: number
        sql: "{totalwonFinanceDeals} * 1.0 / NULLIF({totalFinanceDeals}, 0) * 100"  

      - name: totalEducationDeals
        type: count_distinct
        sql: hs_object_id
        filters:        
        - sql: "{companies.industryClean} = 'Education'"

      - name: totalwonEducationDeals
        type: count_distinct
        sql: hs_object_id
        filters:      
        - sql: "{companies.industryClean} = 'Education'"
        - sql: "{dealsStageFiltered} = 'closedwon'"

      - name: conversionarateEducation
        type: number
        sql: "{totalwonEducationDeals} * 1.0 / NULLIF({totalEducationDeals}, 0) * 100"
     
      - name: totalBusinessServicesDeals
        type: count_distinct
        sql: hs_object_id
        filters:        
        - sql: "{companies.industryClean} = 'Business Services'"

      - name: totalwonBusinessServicesDeals
        type: count_distinct
        sql: hs_object_id
        filters:      
        - sql: "{companies.industryClean} = 'Business Services'"
        - sql: "{dealsStageFiltered} = 'closedwon'"

      - name: conversionarateBusinessServices
        type: number
        sql: "{totalwonBusinessServicesDeals} * 1.0 / NULLIF({totalBusinessServicesDeals}, 0) * 100"    

      - name: totalEarlyStageDeals
        type: count_distinct
        sql: hs_object_id
        filters:
        - sql: "{dealsStageFiltered} IS NULL"

      - name: totalFinalStageDeals
        type: count_distinct
        sql: hs_object_id
        filters:
        - sql: "{dealsStageFiltered} IS NOT NULL"

      - name: conversionRateFinalStage
        type: number
        sql: "{totalDealsFinalStage} * 1.0 / NULLIF({totalDeals}, 0) * 100"

      